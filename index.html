<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Poly Bridge</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/polybridge 1 webgl test2.loader.js";

      // Fetch and merge the split .data parts, then create an object URL for Unity to load
      async function mergeDataParts() {
        const partUrls = [
          buildUrl + "/polybridge 1 webgl test2.data.part1",
          buildUrl + "/polybridge 1 webgl test2.data.part2",
          buildUrl + "/polybridge 1 webgl test2.data.part3"
        ];

        const totalParts = partUrls.length;
        const partProgress = new Array(totalParts).fill(0);

        function updateProgress() {
          // Data merging occupies the first 80% of the progress bar;
          // the remaining 20% is left for Unity's own initialisation.
          const avg = partProgress.reduce((a, b) => a + b, 0) / totalParts;
          progressBarFull.style.width = (avg * 80) + "%";
        }

        const buffers = await Promise.all(
          partUrls.map((url, i) =>
            fetch(url).then(response => {
              if (!response.ok) throw new Error("Failed to fetch " + url + ": " + response.status);
              const contentLength = response.headers.get("Content-Length");
              const total = contentLength ? parseInt(contentLength, 10) : 0;
              let loaded = 0;
              const reader = response.body.getReader();
              const chunks = [];
              return new ReadableStream({
                start(controller) {
                  function push() {
                    reader.read().then(({ done, value }) => {
                      if (done) {
                        controller.close();
                        return;
                      }
                      chunks.push(value);
                      loaded += value.byteLength;
                      if (total) {
                        partProgress[i] = loaded / total;
                        updateProgress();
                      }
                      controller.enqueue(value);
                      push();
                    }).catch(err => controller.error(err));
                  }
                  push();
                }
              });
            }).then(stream => new Response(stream).arrayBuffer())
          )
        );

        // Concatenate all parts into one ArrayBuffer
        const totalBytes = buffers.reduce((sum, buf) => sum + buf.byteLength, 0);
        const merged = new Uint8Array(totalBytes);
        let offset = 0;
        for (const buf of buffers) {
          merged.set(new Uint8Array(buf), offset);
          offset += buf.byteLength;
        }

        const blob = new Blob([merged], { type: "application/octet-stream" });
        return URL.createObjectURL(blob);
      }

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      loadingBar.style.display = "block";

      // Merge parts first, then load Unity
      mergeDataParts().then(function(mergedDataUrl) {
        var config = {
          dataUrl: mergedDataUrl,
          frameworkUrl: buildUrl + "/polybridge 1 webgl test2.framework.js",
          codeUrl: buildUrl + "/polybridge 1 webgl test2.wasm",
          streamingAssetsUrl: "StreamingAssets",
          companyName: "Dry Cactus",
          productName: "Poly Bridge",
          productVersion: "0.75.2",
          showBanner: unityShowBanner,
        };

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            // Unity's own progress occupies the last 20%
            progressBarFull.style.width = (80 + progress * 20) + "%";
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
            URL.revokeObjectURL(mergedDataUrl); // free memory
          }).catch((message) => {
            alert(message);
          });
        };
        document.body.appendChild(script);
      }).catch(function(err) {
        unityShowBanner("Failed to load game data: " + err.message, "error");
      });
    </script>
  </body>
</html>
